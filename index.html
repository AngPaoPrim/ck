<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Luxury Analog Clock</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Prompt:wght@400;500&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:transparent;
font-family:Prompt,sans-serif;
}

body{
display:flex;
justify-content:flex-end;
align-items:flex-start;
padding:25px;
}

.card{

width:360px;

padding:25px;

border-radius:28px;

background:rgba(20,20,30,.35);

backdrop-filter:blur(18px);
-webkit-backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.12);

box-shadow:
0 0 30px rgba(0,255,255,.15),
inset 0 0 15px rgba(255,255,255,.05);

}

.clock{

position:relative;

width:260px;
height:260px;

margin:auto;

border-radius:50%;

background:
radial-gradient(circle at center,#2d2d40,#12121b);

border:3px solid rgba(255,255,255,.08);

box-shadow:
0 0 25px rgba(0,255,255,.18),
inset 0 0 30px rgba(255,255,255,.05);

}

.tick{

position:absolute;

transform-origin:center center;

border-radius:2px;

background:rgba(255,255,255,.45);

}

.tick.big{

background:white;

box-shadow:0 0 8px cyan;

}

.number{

position:absolute;

transform:translate(-50%,-50%);

font-size:22px;

font-weight:bold;

color:white;

text-shadow:0 0 10px cyan;

user-select:none;

}

.hand{

position:absolute;

left:50%;

bottom:50%;

transform-origin:50% 100%;

border-radius:999px;

}

.hour{

width:8px;

height:62px;

margin-left:-4px;

background:white;

}

.minute{

width:5px;

height:90px;

margin-left:-2.5px;

background:#7de7ff;

}

.second{

width:2px;

height:105px;

margin-left:-1px;

background:#ff4545;

}

.center{

position:absolute;

left:50%;

top:50%;

width:16px;

height:16px;

margin-left:-8px;

margin-top:-8px;

border-radius:50%;

background:white;

box-shadow:
0 0 15px cyan,
0 0 30px cyan;

z-index:100;

}

.digital{

margin-top:22px;

text-align:center;

font-family:Orbitron;

font-size:38px;

color:white;

letter-spacing:2px;

text-shadow:0 0 15px cyan;

}

.date{

margin-top:8px;

text-align:center;

font-size:20px;

color:#d7ffff;

}
</style>
</head>

<body>

<div class="card">

<div class="clock" id="clock">

<div class="hand hour" id="hour"></div>

<div class="hand minute" id="minute"></div>

<div class="hand second" id="second"></div>

<div class="center"></div>

</div>

<div class="digital" id="digital"></div>

<div class="date" id="date"></div>

</div>

<script>

const clock=document.getElementById("clock");

const cx=130;
const cy=130;

// Minute marks

for(let i=0;i<60;i++){

const angle=i*6*Math.PI/180-Math.PI/2;

const outer=120;

const len=i%5===0?16:8;

const inner=outer-len;

const x=(outer+inner)/2*Math.cos(angle)+cx;
const y=(outer+inner)/2*Math.sin(angle)+cy;

const tick=document.createElement("div");

tick.className=i%5===0?"tick big":"tick";

tick.style.width=i%5===0?"3px":"2px";

tick.style.height=len+"px";

tick.style.left=x+"px";

tick.style.top=y+"px";

tick.style.transform=`translate(-50%,-50%) rotate(${i*6}deg)`;

clock.appendChild(tick);

}

// Numbers

const r=96;

for(let i=1;i<=12;i++){

const a=i*30*Math.PI/180-Math.PI/2;

const x=cx+r*Math.cos(a);

const y=cy+r*Math.sin(a);

const n=document.createElement("div");

n.className="number";

n.innerHTML=i;

n.style.left=x+"px";

n.style.top=y+"px";

clock.appendChild(n);

}

const days=[
"วันอาทิตย์",
"วันจันทร์",
"วันอังคาร",
"วันพุธ",
"วันพฤหัสบดี",
"วันศุกร์",
"วันเสาร์"
];

const months=[
"มกราคม","กุมภาพันธ์","มีนาคม","เมษายน",
"พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม",
"กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"
];

function update(){

const now=new Date();

const h=now.getHours();

const m=now.getMinutes();

const s=now.getSeconds();

const ms=now.getMilliseconds();

const hourDeg=((h%12)+m/60+s/3600)*30;

const minuteDeg=(m+s/60)*6;

const secondDeg=(s+ms/1000)*6;

document.getElementById("hour").style.transform=
`rotate(${hourDeg}deg)`;

document.getElementById("minute").style.transform=
`rotate(${minuteDeg}deg)`;

document.getElementById("second").style.transform=
`rotate(${secondDeg}deg)`;

document.getElementById("digital").textContent=
`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;

document.getElementById("date").textContent=
`${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()+543}`;

requestAnimationFrame(update);

}

update();

</script>

</body>
</html>
