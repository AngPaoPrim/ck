<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Luxury Analog Clock</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Prompt:wght@400;500&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:transparent;
font-family:Prompt,sans-serif;
}

body{
display:flex;
justify-content:flex-end;
align-items:flex-start;
padding:25px;
}

.card{
width:360px;
padding:25px;
background:transparent;
}

.clock{
display:block;
margin:auto;
overflow:visible;
filter:drop-shadow(0 0 20px rgba(0,255,255,.15));
}

.digital{
margin-top:22px;
text-align:center;
font-family:Orbitron;
font-size:38px;
color:white;
letter-spacing:2px;
text-shadow:0 0 15px cyan;
}

.date{
margin-top:8px;
text-align:center;
font-size:20px;
color:#d7ffff;
}
</style>
</head>

<body>

<div class="card">

<svg id="clock" class="clock" width="260" height="260" viewBox="0 0 260 260">

<circle cx="130" cy="130" r="127" fill="none" stroke="rgba(255,255,255,.18)" stroke-width="3"/>

<g id="ticks"></g>

<g id="numbers"></g>

<line id="hour" x1="130" y1="130" x2="130" y2="68" stroke="white" stroke-width="8" stroke-linecap="round"/>

<line id="minute" x1="130" y1="130" x2="130" y2="40" stroke="#7de7ff" stroke-width="5" stroke-linecap="round"/>

<line id="second" x1="130" y1="130" x2="130" y2="25" stroke="#ff4545" stroke-width="2" stroke-linecap="round"/>

<circle cx="130" cy="130" r="8" fill="white" style="filter:drop-shadow(0 0 6px cyan);"/>

</svg>

<div class="digital" id="digital"></div>

<div class="date" id="date"></div>

</div>

<script>

const svgns="http://www.w3.org/2000/svg";

const cx=130,cy=130,outer=127;

const ticksG=document.getElementById("ticks");

for(let i=0;i<60;i++){

const angleDeg=i*6;

const angleRad=(angleDeg-90)*Math.PI/180;

const len=i%5===0?16:8;

const inner=outer-len;

const x1=cx+inner*Math.cos(angleRad);

const y1=cy+inner*Math.sin(angleRad);

const x2=cx+outer*Math.cos(angleRad);

const y2=cy+outer*Math.sin(angleRad);

const line=document.createElementNS(svgns,"line");

line.setAttribute("x1",x1.toFixed(3));

line.setAttribute("y1",y1.toFixed(3));

line.setAttribute("x2",x2.toFixed(3));

line.setAttribute("y2",y2.toFixed(3));

line.setAttribute("stroke",i%5===0?"white":"rgba(255,255,255,.45)");

line.setAttribute("stroke-width",i%5===0?"3":"2");

line.setAttribute("stroke-linecap","round");

if(i%5===0)line.style.filter="drop-shadow(0 0 4px cyan)";

ticksG.appendChild(line);

}

const numbersG=document.getElementById("numbers");

const r=96;

for(let i=1;i<=12;i++){

const a=(i*30-90)*Math.PI/180;

const x=cx+r*Math.cos(a);

const y=cy+r*Math.sin(a);

const t=document.createElementNS(svgns,"text");

t.setAttribute("x",x.toFixed(3));

t.setAttribute("y",y.toFixed(3));

t.setAttribute("text-anchor","middle");

t.setAttribute("dominant-baseline","central");

t.setAttribute("font-size","22");

t.setAttribute("font-weight","bold");

t.setAttribute("fill","white");

t.style.filter="drop-shadow(0 0 5px cyan)";

t.textContent=i;

numbersG.appendChild(t);

}

const days=[
"วันอาทิตย์",
"วันจันทร์",
"วันอังคาร",
"วันพุธ",
"วันพฤหัสบดี",
"วันศุกร์",
"วันเสาร์"
];

const months=[
"มกราคม","กุมภาพันธ์","มีนาคม","เมษายน",
"พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม",
"กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"
];

function update(){

const now=new Date();

const h=now.getHours();

const m=now.getMinutes();

const s=now.getSeconds();

const ms=now.getMilliseconds();

const hourDeg=((h%12)+m/60+s/3600)*30;

const minuteDeg=(m+s/60)*6;

const secondDeg=(s+ms/1000)*6;

document.getElementById("hour").setAttribute("transform",`rotate(${hourDeg} 130 130)`);

document.getElementById("minute").setAttribute("transform",`rotate(${minuteDeg} 130 130)`);

document.getElementById("second").setAttribute("transform",`rotate(${secondDeg} 130 130)`);

document.getElementById("digital").textContent=
`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;

document.getElementById("date").textContent=
`${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()+543}`;

requestAnimationFrame(update);

}

update();

</script>

</body>
</html>
